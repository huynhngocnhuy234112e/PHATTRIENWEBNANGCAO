<div class="admin-container">
    <div class="header">
        <h1>🧥 Admin Fashion</h1>
        <button class="btn-add" (click)="addNew()">+ Thêm mới Fashion</button>
    </div>

    <div class="error" *ngIf="errMessage">{{ errMessage }}</div>

    <table class="fashion-table" *ngIf="fashions.length > 0">
        <thead>
            <tr>
                <th>Thumbnail</th>
                <th>Tiêu đề</th>
                <th>Style</th>
                <th>Ngày tạo</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let f of fashions">
                <td><img [src]="f.thumbnail" class="thumb" alt="thumb"></td>
                <td>{{ f.fashion_title }}</td>
                <td><span class="badge">{{ f.style }}</span></td>
                <td>{{ f.creation_date | date: 'dd/MM/yyyy' }}</td>
                <td class="actions">
                    <button class="btn-edit" (click)="editFashion(f._id)">✏️ Sửa</button>
                    <button class="btn-delete" (click)="deleteFashion(f._id)">🗑️ Xóa</button>
                </td>
            </tr>
        </tbody>
    </table>

    <p *ngIf="fashions.length === 0 && !errMessage" class="empty">Chưa có Fashion nào.</p>
</div>
