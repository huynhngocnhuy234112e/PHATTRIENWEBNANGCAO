<div>
  <h2>MyComponent</h2>
  <table>
    <tbody>
      <tr>
        <td>Direct myVar</td>
        <td>{{ myVar }}</td>
      </tr>
      <tr>
        <td>Via getMyVar()</td>
        <td>{{ getMyVar() }}</td>
      </tr>
      <tr>
        <td>Uppercase</td>
        <td>{{ myVar.toUpperCase() }}</td>
      </tr>
      <tr>
        <td>Lowercase</td>
        <td>{{ myVar.toLowerCase() }}</td>
      </tr>
    </tbody>
  </table>
</div>
