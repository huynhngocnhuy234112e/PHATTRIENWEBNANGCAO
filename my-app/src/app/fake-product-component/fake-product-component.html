<div class="container mt-4">
    <h2 class="text-center mb-4">Fake Product List</h2>

    <div *ngIf="errMessage" class="alert alert-danger" role="alert">
        <strong>Error:</strong> {{errMessage}}
    </div>

    <div class="table-responsive" *ngIf="!errMessage">
        <table class="table table-bordered table-striped table-hover align-middle">
            <thead class="table-dark text-center">
                <tr>
                    <th>Id</th>
                    <th>Title</th>
                    <th>Price</th>
                    <th>Description</th>
                    <th>Category</th>
                    <th>Image</th>
                    <th>Rating</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let item of data">
                    <td class="text-center">{{item.id}}</td>
                    <td>{{item.title}}</td>
                    <td class="text-end">{{item.price | currency}}</td>
                    <td>{{item.description}}</td>
                    <td class="text-center">{{item.category}}</td>
                    <td class="text-center"><img [src]="item.image" class="img-fluid" style="max-width: 100px; height: auto;" alt="{{item.title}}"></td>
                    <td class="text-center">
                        <span class="badge bg-primary">{{item.rating.rate}}</span>
                        <br>
                        <small class="text-muted">({{item.rating.count}} reviews)</small>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
