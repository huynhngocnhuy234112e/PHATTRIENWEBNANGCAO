<div class="container-fluid">
  <form #registerForm="ngForm">
    <h3 class="text-center">Đăng ký khóa học</h3>

    <div class="mb-3">
      <label for="name">Tên:</label>
      <input type="text" class="form-control" name="name" id="name"
             placeholder="Nhập tên"
             [(ngModel)]="studentModel.name"
             #name="ngModel"
             required
             [class.is-invalid]="name.invalid && name.touched">
      
      <small class="text-danger" [class.d-none]="name.valid || name.untouched">
        Bạn chưa nhập tên
      </small>
    </div>

    <div class="mb-3">
      <label for="email">Email:</label>
      <input type="email" [email]="true" #email="ngModel" required
             class="form-control" id="email" name="email"
             placeholder="Nhập địa chỉ email"
             [(ngModel)]="studentModel.email"
             [class.is-invalid]="email.invalid && email.touched">
      
      <div *ngIf="email.errors && (email.invalid || email.touched)">
        <small class="text-danger" *ngIf="email.errors['required']">
          Bạn chưa nhập email
        </small>
        <small class="text-danger" *ngIf="email.errors['email']">
          Email không hợp lệ
        </small>
      </div>
    </div>

    <div class="mb-3">
      <label for="phone">Điện thoại:</label>
      <input type="text" class="form-control" name="phone" id="phone"
             [(ngModel)]="studentModel.phone">
    </div>

    <div class="mb-3">
      <label for="course">Chọn khóa học:</label>
      <select class="form-select" id="course" name="course"
              [(ngModel)]="studentModel.course"
              #course="ngModel"
              [class.is-invalid]="errFlag && course.touched"
              (blur)="validateCourse(course.value)"
              (change)="validateCourse(course.value)">
        <option value="none">-----------</option>
        <option *ngFor="let c of courses" [value]="c">{{c}}</option>
      </select>
      
      <small class="text-danger" [class.d-none]="!errFlag || course.untouched">
        Vui lòng chọn khóa học
      </small>
    </div>

    <div class="mb-3">
      <label>Chọn ca học: </label>
      <input type="radio" name="time" value="sang" [(ngModel)]="studentModel.time"> Sáng
      <input type="radio" name="time" value="toi" [(ngModel)]="studentModel.time"> Tối
    </div>

    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" id="agree" name="agree" ngModel #agree="ngModel">
      <label class="form-check-label" for="agree">Đồng ý với điều khoản</label>
    </div>

    <button type="submit" class="btn btn-primary"
            [disabled]="registerForm.form.invalid || course.value == 'none' || agree.value == false">
      Submit
    </button>

  </form>

  <p>{{ registerForm.value | json }}</p>
  <p>{{ studentModel | json }}</p>
</div>
